name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_tutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_tutor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_tutor
      JWT_SECRET_KEY: ci-test-secret-key
      ANTHROPIC_API_KEY: test-key
      ANTHROPIC_MODEL: claude-sonnet-4-5
      GRADING_ASYNC_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      BCRYPT_ROUNDS: "4"
      CURRICULUM_CACHE_PUBSUB_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev
      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head
      - name: pytest
        working-directory: backend
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and test
        working-directory: frontend
        run: |
          npm ci
          npm run test
          npm audit --audit-level=critical

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_tutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_tutor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_tutor
      JWT_SECRET_KEY: ci-test-secret-key
      CLAUDE_STUB_MODE: "true"
      # Real API key not required when stub mode is on (see app.config Settings validator).
      ANTHROPIC_MODEL: claude-sonnet-4-5
      GRADING_ASYNC_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      BCRYPT_ROUNDS: "4"
      CURRICULUM_CACHE_PUBSUB_ENABLED: "false"
      CORS_ALLOW_ORIGINS: http://localhost:4173
      VITE_API_BASE_URL: http://localhost:8000
      PLAYWRIGHT_BASE_URL: http://localhost:4173
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: uv sync --extra dev
      - name: Migrate database
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Start backend
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz && exit 0
            sleep 2
          done
          echo "backend failed to start" >&2
          exit 1
      - name: Build and start frontend preview
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run preview -- --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/login && exit 0
            sleep 2
          done
          echo "frontend failed to start" >&2
          exit 1
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        working-directory: frontend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_tutor
          JWT_SECRET_KEY: ci-test-secret-key
        run: npx playwright test
